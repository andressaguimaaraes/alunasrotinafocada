<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotina Focada</title>
  <meta http-equiv="refresh" content="0; url=rotina-focada-membros/login.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .loading {
      text-align: center;
      max-width: 360px;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .brand .accent {
      font-style: italic;
      color: #d4476f;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 36px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #ececec;
      border-top-color: #d4476f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg {
      font-style: italic;
      color: #888;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
    }
    .fallback {
      margin-top: 30px;
      font-size: 13px;
      color: #888;
    }
    .fallback a {
      color: #d4476f;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="brand">Rotina <span class="accent">Focada</span></div>
    <div class="subtitle">Área de Membros</div>
    <div class="spinner"></div>
    <div class="msg">Te levando até o seu acesso...</div>
    <div class="fallback">
      Não foi redirecionada automaticamente?<br/>
      <a href="rotina-focada-membros/login.html">Clique aqui para entrar →</a>
    </div>
  </div>
  <script>
    // Redirect JS (mais rápido que meta refresh)
    window.location.replace("rotina-focada-membros/login.html");
  </script>
</body>
</html>
