<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aula · Rotina Focada</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" style="text-decoration:none;" class="brand">Rotina <span class="accent">Focada</span></a>
      <div class="user-bar">
        <span class="greeting" id="greeting">Olá</span>
        <a href="index.html" class="btn-ghost" style="text-decoration:none;">Todos os módulos</a>
        <button class="btn-ghost" onclick="Auth.logout()">Sair</button>
      </div>
    </div>
  </header>

  <main class="lesson-container" id="lessonContainer">
    <!-- Lesson content rendered via JS -->
  </main>

  <footer class="site-footer">
    Criado por <strong>Andressa Guimarães</strong> · Rotina Focada
  </footer>

  <script src="assets/auth.js"></script>
  <script src="assets/data.js"></script>
  <script>
    Auth.requireAuth();

    const user = Auth.getUser();
    if (user && user.name) {
      document.getElementById("greeting").textContent = `Olá, ${user.name.split(" ")[0]}`;
    }

    // Parse lesson ID
    const params = new URLSearchParams(window.location.search);
    const lessonId = params.get("id");

    // Find lesson and module
    let currentLesson = null;
    let currentModule = null;
    let prevLesson = null;
    let nextLesson = null;
    const flatLessons = [];

    COURSE_DATA.modules.forEach((m) => {
      m.lessons.forEach((l) => {
        flatLessons.push({ ...l, moduleNumber: m.number, moduleTitle: m.title, moduleId: m.id });
      });
    });

    const idx = flatLessons.findIndex((l) => l.id === lessonId);
    if (idx >= 0) {
      currentLesson = flatLessons[idx];
      currentModule = COURSE_DATA.modules.find((m) => m.id === currentLesson.moduleId);
      prevLesson = idx > 0 ? flatLessons[idx - 1] : null;
      nextLesson = idx < flatLessons.length - 1 ? flatLessons[idx + 1] : null;
    }

    const container = document.getElementById("lessonContainer");

    if (!currentLesson) {
      container.innerHTML = `
        <div style="text-align:center; padding: 80px 20px;">
          <h1>Aula não encontrada</h1>
          <p style="margin-top:16px;"><a href="index.html" style="color: var(--accent);">← Voltar para o início</a></p>
        </div>
      `;
    } else {
      document.title = `${currentLesson.title} · Rotina Focada`;

      const isCompleted = Progress.isCompleted(currentLesson.id);
      const diagramSvg = DIAGRAMS[currentLesson.diagram] || "";

      const videoBlock = currentLesson.videoUrl
        ? `<div class="video-wrapper"><iframe src="${currentLesson.videoUrl}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe></div>`
        : `
          <div class="video-wrapper">
            <div class="video-placeholder">
              <div class="play-circle">▶</div>
              <div class="placeholder-text">Vídeo em breve</div>
              <div class="placeholder-sub">A Andressa vai liberar o conteúdo em vídeo aqui</div>
            </div>
          </div>
        `;

      const insightsHTML = currentLesson.insights.map(i => `<li>${i}</li>`).join("");
      const exercisesHTML = currentLesson.exercises.map((ex, i) => `
        <div class="exercise-card">
          <div class="exercise-num">${i + 1}</div>
          <div class="exercise-body">
            <h3>${ex.title}</h3>
            <p>${ex.body}</p>
          </div>
        </div>
      `).join("");

      const prevHTML = prevLesson
        ? `<a href="aula.html?id=${prevLesson.id}" class="nav-link prev">
            <div class="nav-direction">← Aula anterior</div>
            <div class="nav-title">${prevLesson.title}</div>
          </a>`
        : `<div class="nav-link disabled prev">
            <div class="nav-direction">— Início</div>
            <div class="nav-title">Esta é a primeira aula</div>
          </div>`;

      const nextHTML = nextLesson
        ? `<a href="aula.html?id=${nextLesson.id}" class="nav-link next">
            <div class="nav-direction">Próxima aula →</div>
            <div class="nav-title">${nextLesson.title}</div>
          </a>`
        : `<div class="nav-link disabled next">
            <div class="nav-direction">— Fim</div>
            <div class="nav-title">Você chegou ao final</div>
          </div>`;

      container.innerHTML = `
        <nav class="lesson-breadcrumb">
          <a href="index.html">Módulos</a>
          <span class="separator">/</span>
          <a href="index.html#modulo-${currentModule.id}">Módulo ${currentModule.number} — ${currentModule.title}</a>
          <span class="separator">/</span>
          <span>Aula ${currentLesson.number}</span>
        </nav>

        <header class="lesson-header">
          <span class="module-tag">Módulo ${currentModule.number} · Aula ${currentLesson.number}</span>
          <h1>${currentLesson.title}</h1>
          <div class="lesson-tagline">${currentLesson.tagline}</div>
        </header>

        ${videoBlock}

        <section class="lesson-section">
          <span class="section-eyebrow">Resumo da aula</span>
          <h2><span class="section-icon">📖</span> O que você vai entender</h2>
          <p>${currentLesson.summary}</p>
          ${currentLesson.content ? `<div class="rich-content">${currentLesson.content}</div>` : (currentLesson.quote ? `<div class="callout">"${currentLesson.quote}"</div>` : "")}
          <p style="margin-top: 28px; font-weight: 600; color: var(--text);">Os pontos-chave desta aula:</p>
          <ul>${insightsHTML}</ul>
        </section>

        <section class="lesson-section">
          <span class="section-eyebrow">Diagrama visual</span>
          <h2><span class="section-icon">✏️</span> O conceito em uma imagem</h2>
          <div class="diagram-box">
            ${diagramSvg}
          </div>
          <div class="diagram-caption">— um esboço para fixar a ideia</div>
        </section>

        <section class="lesson-section">
          <span class="section-eyebrow">Mãos à obra</span>
          <h2><span class="section-icon">🎯</span> Exercícios passo a passo</h2>
          <p>Não pule esta parte. Aplicar é o que separa quem assiste do que transforma a rotina.</p>
          ${exercisesHTML}
        </section>

        <section class="lesson-section">
          <span class="section-eyebrow">Materiais complementares</span>
          <h2><span class="section-icon">📎</span> Para ir mais fundo</h2>
          <div class="materials-grid">
            ${(() => {
              if (currentLesson.materials && currentLesson.materials.length > 0) {
                return currentLesson.materials.map(m => `
                  <a class="material-link" href="${m.url}" target="_blank" rel="noopener">
                    <span class="material-icon">${m.icon}</span>
                    <div class="material-text">
                      <div class="material-name">${m.name}</div>
                      <div class="material-meta">${m.meta}</div>
                    </div>
                  </a>
                `).join("");
              }
              return `
                <a class="material-link disabled" href="#">
                  <span class="material-icon">📄</span>
                  <div class="material-text">
                    <div class="material-name">PDF da aula</div>
                    <div class="material-meta">Em breve</div>
                  </div>
                </a>
                <a class="material-link disabled" href="#">
                  <span class="material-icon">📋</span>
                  <div class="material-text">
                    <div class="material-name">Template de exercícios</div>
                    <div class="material-meta">Em breve</div>
                  </div>
                </a>
                <a class="material-link disabled" href="#">
                  <span class="material-icon">🔗</span>
                  <div class="material-text">
                    <div class="material-name">Links recomendados</div>
                    <div class="material-meta">Em breve</div>
                  </div>
                </a>
              `;
            })()}
          </div>
        </section>

        <div style="text-align:center;">
          <button class="btn-complete ${isCompleted ? 'completed' : ''}" id="completeBtn">
            <span id="completeIcon">${isCompleted ? '✓' : '○'}</span>
            <span id="completeText">${isCompleted ? 'Aula concluída' : 'Marcar como concluída'}</span>
          </button>
        </div>

        <nav class="lesson-nav">
          ${prevHTML}
          ${nextHTML}
        </nav>
      `;

      // Mark complete button
      const completeBtn = document.getElementById("completeBtn");
      completeBtn.addEventListener("click", () => {
        const isNowDone = Progress.toggle(currentLesson.id);
        if (isNowDone) {
          completeBtn.classList.add("completed");
          document.getElementById("completeIcon").textContent = "✓";
          document.getElementById("completeText").textContent = "Aula concluída";
        } else {
          completeBtn.classList.remove("completed");
          document.getElementById("completeIcon").textContent = "○";
          document.getElementById("completeText").textContent = "Marcar como concluída";
        }
      });
    }
  </script>
</body>
</html>
